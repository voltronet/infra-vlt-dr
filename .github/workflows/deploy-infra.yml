name: "Terraform Deploy Infra"

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: TEST
    # AICI ESTE SECRETUL: Injectăm variabilele de mediu pentru tot JOB-ul
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: "eu-central-1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=environments/test init

      - name: Check aws configure
        run: aws configure list

      - name: Terraform Plan
        run: terraform -chdir=environments/test plan -no-color
        env:
          # Repetăm aici pentru siguranță și adăugăm variabilele de Terraform
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_my_ip_address: ${{ vars.TF_VAR_my_ip_address }}
          TF_VAR_ssh_key_name: ${{ secrets.TF_VAR_ssh_key_name }}