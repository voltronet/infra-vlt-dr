name: "Terraform Module Validation"

on:
  workflow_dispatch:
  push:
    paths:
      - 'infra-vlt-dr/**'
      - '.github/workflows/validate-modules.yml'

jobs:
  validate-compute:
    name: "Validate compute module"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Run compute module tests
        run: |
          cd infra-vlt-dr/tests/compute
          terraform init -backend=false
          terraform test

  validate-storage:
    name: "Validate storage module"
    runs-on: ubuntu-latest
    needs: validate-compute
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Run storage module tests
        run: |
          cd infra-vlt-dr/tests/storage
          terraform init -backend=false
          terraform test

  validate-vpc:
    name: "Validate vpc module"
    runs-on: ubuntu-latest
    needs: validate-storage
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Run vpc module tests
        run: |
          cd infra-vlt-dr/tests/vpc
          terraform init -backend=false
          terraform test
